<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Premium Checker</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts for premium typography -->
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            font-family: 'Hind Siliguri', 'Poppins', sans-serif;
            background: radial-gradient(circle at 10% 20%, rgba(230, 242, 255, 0.6) 0%, rgba(244, 230, 255, 0.6) 90%),
                        linear-gradient(135deg, #cbd5e1 0%, #cbd5e1 1%, #e2e8f0 100%);
            background-attachment: fixed;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.65);
            box-shadow: 0 15px 35px rgba(100, 116, 139, 0.08),
                        inset 0 1px 0 rgba(255, 255, 255, 0.7);
        }
        .glass-input {
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.55);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-input:focus {
            background: rgba(255, 255, 255, 0.65);
            border-color: rgba(99, 102, 241, 0.6);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.15);
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 5px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.12);
            border-radius: 4px;
        }
    </style>
</head>
<body class="min-h-screen text-slate-800 p-4 md:p-8">

    <div class="max-w-4xl mx-auto space-y-6">

        <!-- Top Admin Header -->
        <header class="flex items-center justify-between glass-panel p-5 rounded-2xl border border-slate-200 shadow-sm">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-indigo-500 to-indigo-600 flex items-center justify-center text-white shadow-md border border-white/40">
                    <i class="fa-solid fa-user-gear"></i>
                </div>
                <div>
                    <h1 class="text-lg font-bold text-slate-900">Admin Dashboard</h1>
                    <p class="text-xs text-slate-600 font-bold">ম্যানেজ করুন EWK TEAM রিপোর্ট ও আইডি ডাটাবেস</p>
                </div>
            </div>
            <a href="checker.html" target="_blank" class="bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold px-4 py-2.5 rounded-xl transition flex items-center gap-2 shadow-md shadow-indigo-600/10">
                <i class="fa-solid fa-square-arrow-up-right"></i> ভিউ চেকার
            </a>
        </header>

        <!-- Main Dashboard Split Content -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <!-- Left Side: Add/Edit Data Form -->
            <section class="glass-panel rounded-2xl p-6 space-y-5">
                <div class="border-b border-white/50 pb-3 flex items-center gap-2">
                    <h2 id="formTitle" class="font-bold text-slate-800 flex items-center gap-2">
                        <i class="fa-solid fa-circle-plus text-indigo-600"></i> নতুন রিপোর্ট ডাটা যুক্ত করুন
                    </h2>
                </div>

                <div class="space-y-4">
                    <!-- Date Picker -->
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1.5">তারিখ নির্বাচন করুন</label>
                        <input type="date" id="adminDate" class="w-full glass-input rounded-xl px-4 py-3 text-sm text-slate-800 focus:outline-none" />
                    </div>

                    <!-- Type Selector -->
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1.5">রিপোর্ট টাইপ</label>
                        <input type="text" id="adminType" placeholder="যেমন: FB 0 FND Cookies" class="w-full glass-input rounded-xl px-4 py-3 text-sm text-slate-800 placeholder-slate-400 focus:outline-none" />
                    </div>

                    <!-- Input OK IDs Area -->
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1.5">অনুমোদিত OK আইডিসমূহ (প্রতি লাইনে একটি)</label>
                        <textarea id="adminOkIds" rows="6" placeholder="61591072925264&#10;61591422470207" class="w-full glass-input rounded-xl p-4 text-sm font-mono text-slate-800 placeholder-slate-300 focus:outline-none resize-none"></textarea>
                    </div>

                    <!-- Multi-action Button Layout -->
                    <div class="space-y-2">
                        <button onclick="saveReportData()" class="w-full bg-gradient-to-r from-indigo-500 to-indigo-600 hover:from-indigo-600 hover:to-indigo-700 text-white font-bold py-3.5 rounded-xl transition shadow-md shadow-indigo-600/15 flex items-center justify-center gap-2">
                            <i class="fa-solid fa-floppy-disk"></i> <span id="submitBtnText">ডাটাবেজে সংরক্ষণ করুন</span>
                        </button>
                        <button id="cancelEditBtn" onclick="cancelEdit()" class="w-full bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold py-2 rounded-xl transition flex items-center justify-center gap-1.5 hidden">
                            <i class="fa-solid fa-xmark"></i> এডিট বাতিল করুন
                        </button>
                    </div>
                </div>
            </section>

            <!-- Right Side: Database Display / Control -->
            <section class="glass-panel rounded-2xl p-6 flex flex-col justify-between">
                <div>
                    <div class="border-b border-white/50 pb-3 flex items-center justify-between mb-4">
                        <div class="flex items-center gap-2">
                            <i class="fa-solid fa-database text-indigo-600"></i>
                            <h2 class="font-bold text-slate-800">সংরক্ষিত রিপোর্টসমূহ</h2>
                        </div>
                        <span id="dbItemCount" class="bg-white/60 text-slate-600 text-xs px-2.5 py-1 rounded-full border border-white/80 font-bold shadow-sm">০ টি এন্ট্রি</span>
                    </div>

                    <!-- List container -->
                    <div class="space-y-3 max-h-[350px] overflow-y-auto custom-scrollbar pr-1" id="dbItemsList">
                        <div class="text-center py-8 text-slate-400 text-sm">
                            <i class="fa-solid fa-box-open text-3xl mb-2 block"></i>
                            কোনো ডাটা পাওয়া যায়নি!
                        </div>
                    </div>
                </div>

                <!-- Database Wipe Action -->
                <div class="pt-4 border-t border-white/50 mt-4">
                    <button onclick="clearFullDatabase()" class="w-full bg-rose-50 hover:bg-rose-100 text-rose-600 border border-rose-200/50 text-xs font-bold py-2.5 rounded-xl transition flex items-center justify-center gap-1.5 shadow-sm">
                        <i class="fa-solid fa-trash-arrow-up"></i> সম্পূর্ণ ডাটাবেস মুছুন
                    </button>
                </div>
            </section>

        </div>

        <!-- Footer -->
        <footer class="text-center text-xs text-slate-500 py-4 font-bold">
            developer MOTALEB
        </footer>

    </div>

    <!-- Toast Component -->
    <div id="toast" class="fixed bottom-5 left-1/2 -translate-x-1/2 bg-white/90 backdrop-blur-md border border-white text-slate-800 text-xs px-4 py-3 rounded-full shadow-xl transition-all duration-300 transform translate-y-20 opacity-0 z-50 flex items-center gap-2 font-bold"></div>

    <script>
        // সরাসরি আপনার ফায়ারবেস ডেটাবেস লিঙ্ক যুক্ত করা হলো
        const FIREBASE_URL = "https://report-checker-f0822-default-rtdb.firebaseio.com/reports.json";

        let dbData = [];
        let editModeId = null; // Stores current report ID being edited

        window.addEventListener('DOMContentLoaded', () => {
            loadDatabase();
        });

        // ফায়ারবেস থেকে ডাটা লোড করার রিয়েল-টাইম ফাংশন
        function loadDatabase() {
            fetch(FIREBASE_URL)
                .then(res => res.json())
                .then(data => {
                    if (data) {
                        if (Array.isArray(data)) {
                            dbData = data.filter(item => item !== null);
                        } else {
                            dbData = Object.keys(data).map(key => {
                                return { id: key, ...data[key] };
                            });
                        }
                    } else {
                        dbData = [];
                    }
                    renderDbItems();
                })
                .catch(err => {
                    console.error("Error loading database", err);
                    showToast('<i class="fa-solid fa-triangle-exclamation text-rose-500"></i> ডাটাবেস সংযোগে ত্রুটি!');
                });
        }

        // ফায়ারবেসের সাথে লোকাল ডাটাবেস সিঙ্ক করার ফাংশন
        function syncWithFirebase() {
            fetch(FIREBASE_URL, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(dbData)
            })
            .then(() => {
                loadDatabase();
            })
            .catch(err => {
                showToast('<i class="fa-solid fa-triangle-exclamation text-rose-500"></i> সার্ভার সিঙ্ক ব্যর্থ হয়েছে!');
            });
        }

        function saveReportData() {
            const dateInput = document.getElementById('adminDate').value;
            const typeInput = document.getElementById('adminType').value.trim();
            const rawIds = document.getElementById('adminOkIds').value;

            if (!dateInput || !typeInput) {
                showToast('<i class="fa-solid fa-triangle-exclamation text-indigo-500"></i> দয়া করে তারিখ এবং টাইপ ইনপুট দিন!');
                return;
            }

            const okIds = [...new Set(rawIds.split('\n')
                .map(id => id.trim())
                .filter(id => id !== ''))];

            if (okIds.length === 0) {
                showToast('<i class="fa-solid fa-triangle-exclamation text-indigo-500"></i> অনুগ্রহ করে অন্তত একটি আইডি দিন!');
                return;
            }

            if (editModeId) {
                // UPDATE / EDIT MODE ACTIVATED
                const index = dbData.findIndex(item => item.id === editModeId);
                if (index !== -1) {
                    dbData[index].date = dateInput;
                    dbData[index].type = typeInput;
                    dbData[index].ok_ids = okIds;
                }
                cancelEdit();
                showToast('<i class="fa-solid fa-circle-check text-emerald-500"></i> ডাটা সফলভাবে আপডেট করা হয়েছে!');
            } else {
                // STANDARD CREATE MODE
                const newEntry = {
                    id: 'report_' + Date.now(),
                    date: dateInput,
                    type: typeInput,
                    ok_ids: okIds
                };
                dbData.push(newEntry);
                showToast('<i class="fa-solid fa-circle-check text-emerald-500"></i> ডাটা সংরক্ষণ করা হয়েছে!');
            }
            
            syncWithFirebase();
        }

        // Activates Edit Mode on selected item card
        function editEntry(id) {
            const item = dbData.find(x => x.id === id);
            if (!item) return;

            editModeId = id;
            document.getElementById('formTitle').innerHTML = '<i class="fa-solid fa-pen-to-square text-indigo-600"></i> রিপোর্ট ডাটা এডিট করুন';
            document.getElementById('submitBtnText').textContent = 'ডাটা আপডেট করুন';
            document.getElementById('cancelEditBtn').classList.remove('hidden');

            document.getElementById('adminDate').value = item.date;
            document.getElementById('adminType').value = item.type;
            document.getElementById('adminOkIds').value = item.ok_ids.join('\n');
            
            // Scroll to the edit form for mobile friendliness
            document.getElementById('adminDate').scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        // Resets the left side form to creation state
        function cancelEdit() {
            editModeId = null;
            document.getElementById('formTitle').innerHTML = '<i class="fa-solid fa-circle-plus text-indigo-600"></i> নতুন রিপোর্ট ডাটা যুক্ত করুন';
            document.getElementById('submitBtnText').textContent = 'ডাটাবেজে সংরক্ষণ করুন';
            document.getElementById('cancelEditBtn').classList.add('hidden');

            document.getElementById('adminDate').value = '';
            document.getElementById('adminType').value = '';
            document.getElementById('adminOkIds').value = '';
        }

        function renderDbItems() {
            const container = document.getElementById('dbItemsList');
            document.getElementById('dbItemCount').textContent = `${dbData.length} টি এন্ট্রি`;
            container.innerHTML = '';

            if (dbData.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-8 text-slate-400 text-sm">
                        <i class="fa-solid fa-box-open text-3xl mb-2 block"></i>
                        কোনো ডাটা পাওয়া যায়নি!
                    </div>
                `;
                return;
            }

            const reversedData = [...dbData].reverse();

            reversedData.forEach((item) => {
                const card = document.createElement('div');
                card.className = 'bg-white/50 border border-white/60 p-3.5 rounded-xl text-xs space-y-1 relative group hover:border-white transition-all shadow-sm';
                
                // Embedded Action Buttons with Tooltips (Edit + Secure Delete)
                card.innerHTML = `
                    <div class="flex items-center justify-between pr-20">
                        <span class="font-bold text-slate-800">${item.type}</span>
                        <span class="text-indigo-600 font-mono font-bold">${item.date}</span>
                    </div>
                    <p class="text-slate-500 font-mono truncate">ID count: <span class="text-emerald-600 font-bold">${item.ok_ids.length} entries</span></p>
                    
                    <div class="absolute top-1/2 right-3 -translate-y-1/2 flex gap-1.5">
                        <!-- Edit Button -->
                        <button onclick="editEntry('${item.id}')" class="bg-indigo-50 hover:bg-indigo-100 text-indigo-600 p-2 rounded-lg transition" title="এডিট করুন">
                            <i class="fa-regular fa-pen-to-square"></i>
                        </button>
                        <!-- Delete Button -->
                        <button onclick="deleteEntry('${item.id}')" class="bg-rose-50 hover:bg-rose-100 text-rose-600 p-2 rounded-lg transition" title="মুছে ফেলুন">
                            <i class="fa-regular fa-trash-can"></i>
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function deleteEntry(id) {
            // Confirmation alert to prevent data loss
            if (confirm("আপনি কি নিশ্চিত যে আপনি এই এন্ট্রিটি মুছে ফেলতে চান?")) {
                dbData = dbData.filter(item => item.id !== id);
                if (editModeId === id) {
                    cancelEdit();
                }
                syncWithFirebase();
                showToast('<i class="fa-solid fa-trash-can text-rose-500"></i> এন্ট্রিটি মুছে ফেলা হয়েছে!');
            }
        }

        function clearFullDatabase() {
            if (confirm("আপনি কি নিশ্চিত যে আপনি সম্পূর্ণ ডাটাবেজ মুছে ফেলতে চান? এটি রিভার্স করা যাবে না।")) {
                dbData = [];
                cancelEdit();
                syncWithFirebase();
                showToast('<i class="fa-solid fa-trash-arrow-up text-rose-500"></i> সম্পূর্ণ ডাটা মুছে ফেলা হয়েছে!');
            }
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerHTML = message;
            toast.classList.remove('opacity-0', 'translate-y-20');
            toast.classList.add('opacity-100', 'translate-y-0');

            setTimeout(() => {
                toast.classList.remove('opacity-100', 'translate-y-0');
                toast.classList.add('opacity-0', 'translate-y-20');
            }, 2500);
        }
    </script>
</body>
</html>
